{% extends "base.html" %}
{% block content %}
<div class="card">
    <div class="card-body">
        <h5 class="card-title"><i class="bi bi-signpost-2 me-2"></i>Маршрутный лист</h5>
        <div class="d-flex align-items-end gap-2 mb-3 flex-wrap">
            <div style="min-width:210px">
                <label class="form-label small">Месяц</label>
                <div class="input-group input-group-sm">
                    <button class="btn btn-outline-secondary" onclick="changeRouteMonth(-1)"><i class="bi bi-chevron-left"></i></button>
                    <span class="form-control text-center fw-semibold" id="routeMonthLabel"></span>
                    <button class="btn btn-outline-secondary" onclick="changeRouteMonth(1)"><i class="bi bi-chevron-right"></i></button>
                </div>
            </div>
            <div>
                <button class="btn btn-outline-secondary btn-sm" onclick="toggleRouteSort()" id="routeSortBtn" title="Новые сверху">
                    <i class="bi bi-sort-down-alt"></i> <span id="routeSortLabel">Новые сверху</span>
                </button>
            </div>
        </div>
        <div id="routeTableContainer" style="display:none">
            <div class="table-responsive">
                <table class="table table-sm table-bordered align-middle" id="routeTable">
                    <thead class="table-dark">
                        <tr>
                            <th class="text-center" style="width:50px">№ п.п.</th>
                            <th>Логин1с</th>
                            <th style="width:130px">Дата</th>
                            <th>Содержание</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
        <div id="routeEmpty" class="text-muted small" style="display:none">Нет данных за выбранный месяц</div>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script src="{{ url_for('static', filename='js/route.js') }}?v=4"></script>
<script>document.addEventListener('DOMContentLoaded',()=>{loadRouteSheet();});</script>
{% endblock %}
