<div class="modal-dialog modal-lg modal-dialog-scrollable">
    <div class="modal-content position-relative">
        <div class="modal-header bg-primary">
            <h5 class="modal-title"><i class="bi bi-file-earmark-text me-2"></i>Формирование документов</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
            <input type="hidden" id="docFormGuid">
            <div class="doc-section">
                <div class="doc-section-header doc-header-basic d-md-none" onclick="toggleDocSection(this)">Основные данные <i class="bi bi-chevron-up ms-auto"></i></div>
                <div class="doc-section-body d-md-block" id="docBasicSection">
                <div class="row g-3">
                    <div class="col-6"><label class="form-label fw-semibold small">Номер магазина</label><input type="text" class="form-control" id="docShop" placeholder="Напр. 14908"></div>
                    <div class="col-6"><label class="form-label fw-semibold small">SAP-код</label><input type="text" class="form-control" id="docSap" placeholder="Напр. O055"></div>
                    <div class="col-12"><label class="form-label fw-semibold small">Адрес</label><textarea class="form-control" id="docAddr" rows="2" placeholder="Адрес магазина"></textarea></div>
                    <div class="col-6"><label class="form-label fw-semibold small">Номер задачи</label><input type="text" class="form-control" id="docZd" placeholder="Напр. ХК-002308"></div>
                    <div class="col-6"><label class="form-label fw-semibold small">Код заявки</label><input type="text" class="form-control" id="docCode" placeholder="Напр. ИНЦ-000123456"></div>
                    <div class="col-12"><label class="form-label fw-semibold small">Описание</label><textarea class="form-control" id="docDesc" rows="3" placeholder="Описание работ"></textarea></div>
                </div>
                </div>
            </div>
            <hr class="my-3">
            <div class="doc-section">
                <div class="doc-section-header doc-header-goods d-md-none" onclick="toggleDocSection(this)">Товары для М15 <i class="bi bi-chevron-down ms-auto"></i></div>
                <div class="doc-section-body d-none d-md-block" id="docProductsSection">
                <label class="fw-semibold small d-block mb-1"><i class="bi bi-box-seam me-1"></i>Товары для М15</label>
                <div class="row g-2 align-items-center">
                    <div class="col-8 col-md-6"><select class="form-select form-select-sm" id="docStorageSelect" onchange="loadDocProducts()"><option value="">Выберите склад...</option></select></div>
                    <div class="col-4 col-md-2"><button class="btn btn-outline-secondary btn-sm w-100" onclick="loadDocProducts()"><i class="bi bi-arrow-repeat"></i></button></div>
                    <div class="col-12 col-md-4"><input type="text" class="form-control form-control-sm" id="docProductSearch" placeholder="Поиск товара..." oninput="filterDocProducts()" autocomplete="off" autocorrect="off" spellcheck="false"></div>
                </div>
                <div id="docProductsList" class="mt-2" style="max-height:180px;overflow-y:auto"><div class="text-muted small text-center py-3">Выберите склад</div></div>
                <div id="docSelectedProducts" class="mt-2 d-flex gap-2 flex-wrap"></div>
                </div>
            </div>
            <div class="d-flex align-items-center gap-4 flex-wrap">
                <div class="form-check"><input class="form-check-input" type="checkbox" id="docIncludeAct" checked><label class="form-check-label fw-semibold small" for="docIncludeAct">АВР (Акт)</label></div>
                <div class="form-check"><input class="form-check-input" type="checkbox" id="docIncludeFn"><label class="form-check-label fw-semibold small" for="docIncludeFn">Акт ФН</label></div>
                <div class="form-check"><input class="form-check-input" type="checkbox" id="docIncludeM15"><label class="form-check-label fw-semibold small" for="docIncludeM15">М15 (Накладная)</label></div>
            </div>
        </div>
        <div class="modal-footer" id="docFormFooter">
            <button class="btn btn-secondary" data-bs-dismiss="modal" id="docFormCancelBtn">Отмена</button>
            <button class="btn btn-primary" onclick="generateDocForm()" id="docFormSubmitBtn"><i class="bi bi-file-earmark-pdf me-1"></i>Сформировать</button>
        </div>
        <div id="docFormLoading" class="d-none position-absolute top-0 start-0 w-100 h-100 d-flex flex-column align-items-center justify-content-center bg-white bg-opacity-90" style="z-index:1060;border-radius:inherit;">
            <div class="spinner-border text-primary mb-3" role="status" style="width:3rem;height:3rem;"></div>
            <div class="fw-semibold mb-1">Формирование документов...</div>
            <div class="small text-muted" id="docFormStatus">Подготовка данных</div>
        </div>
    </div>
</div>
