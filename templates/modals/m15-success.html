<div class="modal fade" id="m15EquipmentModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header bg-success text-white">
                <h6 class="modal-title"><i class="bi bi-check-circle me-2"></i>Документы сформированы</h6>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <textarea class="form-control" id="m15EquipmentText" rows="8" readonly
                    style="font-size:0.875rem;resize:none;font-family:monospace;"></textarea>
            </div>
            <div class="modal-footer">
                <button class="btn btn-outline-secondary" id="m15CopyBtn" onclick="copyM15Equipment()">
                    <i class="bi bi-clipboard me-1"></i>Копировать
                </button>
                <button class="btn btn-outline-primary d-none" id="m15ShareBtn" onclick="shareM15Equipment()">
                    <i class="bi bi-share me-1"></i>Поделиться
                </button>
                <button class="btn btn-primary" data-bs-dismiss="modal">OK</button>
            </div>
        </div>
    </div>
</div>
