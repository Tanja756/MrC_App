<div class="modal fade" id="createTransferModal" tabindex="-1">
    <div class="modal-dialog modal-lg modal-dialog-scrollable">
        <div class="modal-content position-relative">
            <div class="modal-header bg-primary">
                <h5 class="modal-title"><i class="bi bi-arrow-left-right me-2"></i>Создание перемещения</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="row g-3 mb-3">
                    <div class="col-md-6"><label class="form-label fw-semibold small">Откуда</label><select class="form-select" id="transferSource"><option value="">Выберите склад...</option></select></div>
                    <div class="col-md-6"><label class="form-label fw-semibold small">Куда</label><select class="form-select" id="transferDest"><option value="">Выберите склад...</option></select></div>
                </div>
                <label class="fw-semibold small d-block mb-2"><i class="bi bi-box-seam me-1"></i>Товары</label>
                <div class="row g-2 align-items-center mb-2">
                    <div class="col-md-6"><div class="input-group"><span class="input-group-text bg-white"><i class="bi bi-search text-muted"></i></span><input type="text" class="form-control" id="transferProductSearch" placeholder="Поиск товара..." oninput="filterTransferProducts()"></div></div>
                    <div class="col-md-3"><select class="form-select" id="transferStoragePick" onchange="loadTransferProducts()"><option value="">Склад остатков...</option></select></div>
                </div>
                <div id="transferProductsList" class="mb-3" style="max-height:200px;overflow-y:auto;border:1px solid var(--bs-border-color);border-radius:var(--bs-border-radius);"><div class="text-muted small text-center py-3">Выберите склад остатков</div></div>
                <div id="transferSelectedItems" class="d-flex gap-2 flex-wrap mb-3"></div>
                <div class="mb-3">
                    <label class="fw-semibold small d-block mb-1"><i class="bi bi-camera me-1"></i>Фото</label>
                    <div class="d-flex gap-2 align-items-center">
                        <input type="file" class="form-control form-control-sm" id="transferPhotoInput" accept="image/*" multiple onchange="onTransferPhotoSelected(this)">
                        <button class="btn btn-outline-secondary btn-sm" onclick="captureTransferPhoto()" title="Сделать фото"><i class="bi bi-camera"></i></button>
                        <input type="file" id="transferCameraInput" accept="image/*" capture="environment" multiple style="display:none" onchange="onTransferPhotoSelected(this)">
                    </div>
                    <div id="transferPhotoPreview" class="d-flex gap-2 flex-wrap mt-2"></div>
                </div>
                <div class="mb-2"><label class="fw-semibold small d-block mb-1">Комментарий</label><textarea class="form-control" id="transferComment" rows="2" placeholder="Причина перемещения..."></textarea></div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" data-bs-dismiss="modal">Отмена</button>
                <button class="btn btn-primary" onclick="submitTransfer()" id="submitTransferBtn"><i class="bi bi-check-lg me-1"></i>Создать</button>
            </div>
            <div id="transferFormLoading" class="d-none position-absolute top-0 start-0 w-100 h-100 d-flex flex-column align-items-center justify-content-center bg-white bg-opacity-90" style="z-index:1060;border-radius:inherit;">
                <div class="spinner-border text-primary mb-3" role="status" style="width:3rem;height:3rem;"></div>
                <div class="fw-semibold">Отправка...</div>
            </div>
        </div>
    </div>
</div>
